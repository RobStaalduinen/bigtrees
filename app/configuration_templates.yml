accessible_schedule:
  description: 'Allow all employees read-only access to approved and scheduled jobs'
  type: 'boolean'
  default: false
job_notifications:
  description: 'Send email notifications when a job starts or completes'
  type: 'boolean'
  default: false
use_connected_email:
  description: 'Send emails via connected Nylas account'
  type: 'boolean'
  default: true
receipt_notifications:
  description: 'Send email notifications to the organization when a new receipt is submitted'
  type: 'boolean'
  default: false
equipment_repair_notifications:
  description: 'Send email notifications to the organization when a new Equipment Repair/Maintenance Request is submitted'
  type: 'boolean'
  default: false